{% extends 'base.html' %}
{% load i18n %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1 class="mb-4">{{ title }}</h1>
<p>{% blocktrans with object_name=object %}Are you sure you want to delete {{ object_name }}?{% endblocktrans %}</p>
<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">{% trans 'Yes, delete' %}</button>
</form>
{% endblock %}
