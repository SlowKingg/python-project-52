{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1 class="mb-4">{{ title }}</h1>
<form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% bootstrap_button submit_label button_type='submit' button_class='btn btn-primary' %}
</form>
{% endblock %}
